name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 20

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            hrms/client/package-lock.json
            hrms/server/package-lock.json
      
      - name: Install server dependencies
        working-directory: hrms/server
        run: npm ci
      
      - name: Install client dependencies
        working-directory: hrms/client
        run: npm ci
      
      - name: TypeCheck server
        working-directory: hrms/server
        run: npx tsc --noEmit
      
      - name: TypeCheck client
        working-directory: hrms/client
        run: npx tsc --noEmit
      
      - name: Build client
        working-directory: hrms/client
        run: npm run build

  test:
    name: Test
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install server dependencies
        working-directory: hrms/server
        run: npm ci
      
      - name: Run server tests
        working-directory: hrms/server
        run: npx tsx src/db/seed.ts
      
      - name: Start server
        working-directory: hrms/server
        run: |
          npx tsx src/index.ts &
          sleep 3
      
      - name: Health check
        run: curl --fail http://localhost:5000/api/health || exit 1

  build-and-push:
    name: Build & Push Docker Image
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: hrms
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/hrms:latest
            ${{ secrets.DOCKER_USERNAME }}/hrms:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/main'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/hrms
            docker-compose pull
            docker-compose up -d --force-recreate
            docker system prune -af
